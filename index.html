<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SifexPing - Auto Update System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00E6FF; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: rgba(10,10,10,0.95); border: 2px solid var(--neon); padding: 40px 30px; border-radius: 25px; text-align: center; box-shadow: 0 0 30px rgba(0,230,255,0.3); width: 90%; max-width: 420px; position: relative; }
        h2 { color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 2px; margin-bottom: 5px; }
        .status { font-size: 13px; color: #888; margin-bottom: 25px; min-height: 20px; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: var(--neon); color: black; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; font-size: 15px; text-transform: uppercase; margin-top: 10px; text-decoration: none; display: block; }
        .btn:active { transform: scale(0.98); }
        .key-box { display: none; margin-top: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .key-display { font-size: 19px; color: #FFEB3B; font-weight: bold; background: #1a1a1a; padding: 18px; border-radius: 12px; border: 1px solid rgba(255,235,59,0.3); display: block; margin: 15px 0; word-break: break-all; letter-spacing: 1px; }
        .instruction { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SIFEXPING PRO</h2>
        <div id="status-text" class="status">Hệ thống sẵn sàng</div>
        <div class="loader" id="loader"></div>

        <div id="step-start">
            <p style="font-size: 14px; color: #ccc; margin-bottom: 20px;">Nhấn nút để lấy link rút gọn và nhận Key 24h.</p>
            <button id="btn-main" class="btn" onclick="generateShortLink()">LẤY KEY TỰ ĐỘNG</button>
            <div class="instruction">Lưu ý: Sau khi vượt link xong, Key sẽ tự động hiển thị tại đây.</div>
        </div>

        <div id="step-result" class="key-box">
            <p style="color: #4CAF50; font-weight: bold;">ĐÃ CẬP NHẬT MÁY CHỦ!</p>
            <span class="key-display" id="final-key">...</span>
            <button class="btn" onclick="copyKey()">SAO CHÉP MÃ KEY</button>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH ---
        const GITHUB_USER = "nguyentieu08";
        const GITHUB_REPO = "SifexPing_Key";
        const GITHUB_FILE = "keys.txt";
        const GITHUB_TOKEN = "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";
        const LINK4M_API = "6535cd3e87fc4d228f7e0fb1"; 

        const params = new URLSearchParams(window.location.search);
        const deviceId = params.get('device') || "DEVICE_UNKNOWN";
        const isDone = params.get('done') === 'true';

        // Xử lý khi quay lại sau khi vượt link
        if (isDone) {
            document.getElementById('step-start').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status-text').innerText = "Đang kiểm tra kết quả & ghi đè GitHub...";
            processKeyUpdate();
        }

        function generateShortLink() {
            const status = document.getElementById('status-text');
            status.innerText = "Vui lòng vượt link ở cửa sổ mới...";
            
            // Đường dẫn đích sau khi người dùng vượt xong
            const currentUrl = window.location.href.split('?')[0];
            const callback = `${currentUrl}?device=${deviceId}&done=true`;
            
            // Link gọi API trực tiếp của Link4M
            const apiUrl = `https://link4m.co/api-shorten/v2?api=${LINK4M_API}&url=${encodeURIComponent(callback)}`;

            // Mở link API trong tab mới. 
            // Link4M API trả về JSON, người dùng chỉ cần click vào link trong JSON đó.
            window.open(apiUrl, '_blank');
            
            // Thông báo cho người dùng
            alert("Hệ thống đã mở Link API. Vui lòng:\n1. Copy link sau chữ 'shortenedUrl'.\n2. Dán vào trình duyệt và vượt link.\n3. Key sẽ hiện tại đây sau khi bạn hoàn tất.");
        }

        async function processKeyUpdate() {
            try {
                // Tạo Secret mới
                const newSecret = "SFX-" + Math.random().toString(36).substring(2, 12).toUpperCase();
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
                
                // 1. Lấy SHA
                const getRes = await fetch(apiUrl, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });
                if (!getRes.ok) throw new Error("GitHub Auth Failed");
                const fileData = await getRes.json();
                
                // 2. Ghi đè file keys.txt
                const updateRes = await fetch(apiUrl, {
                    method: "PUT",
                    headers: { 
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `AutoKey: ${deviceId}`,
                        content: btoa(newSecret),
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) {
                    const today = new Date().toISOString().slice(0, 10);
                    const raw = deviceId + newSecret + today;
                    const hash = CryptoJS.SHA256(raw).toString().toUpperCase();
                    const displayKey = `Sifex-Ping-${hash.substring(0, 4)}-${hash.substring(4, 8)}`;
                    
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('status-text').style.display = 'none';
                    document.getElementById('step-result').style.display = 'block';
                    document.getElementById('final-key').innerText = displayKey;
                } else {
                    throw new Error("Ghi file thất bại");
                }
            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status-text').innerHTML = `<span style="color:red">LỖI: ${err.message}</span>`;
            }
        }

        function copyKey() {
            const keyText = document.getElementById('final-key').innerText;
            const el = document.createElement('textarea');
            el.value = keyText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Đã sao chép Key!");
        }
    </script>
</body>
</html>
