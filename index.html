<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SifexPing - Hệ Thống Get Key</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --neon: #00E6FF; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px var(--neon); width: 90%; max-width: 400px; }
        .id-box { background: #111; padding: 10px; border-radius: 8px; margin: 15px 0; border: 1px dashed #444; font-size: 12px; color: #777; word-break: break-all; }
        .btn { background: var(--neon); color: black; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .key-box { display: none; margin-top: 20px; animation: slideUp 0.5s ease; }
        .key-text { font-size: 20px; color: #FFEB3B; font-weight: bold; background: #222; padding: 15px; border-radius: 10px; border: 1px solid #FFEB3B; display: block; margin: 10px 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--neon)">SIFEXPING PRO</h2>
        <div class="id-box" id="dev-id">Đang quét thiết bị...</div>

        <div id="step-1">
            <p style="font-size: 14px;">Hệ thống sẽ tạo Link rút gọn cho riêng thiết bị của bạn.</p>
            <button class="btn" id="btn-start" onclick="generateLink()">TẠO LINK GET KEY</button>
        </div>

        <div id="step-2" class="key-box">
            <p style="color: #4CAF50">VƯỢT LINK THÀNH CÔNG!</p>
            <span class="key-text" id="final-key">...</span>
            <button class="btn" style="background:#444; color:white;" onclick="copyKey()">SAO CHÉP KEY</button>
        </div>
    </div>

    <script>
        // CẤU HÌNH
        const GITHUB_RAW_URL = "https://raw.githubusercontent.com/nguyentieu08/SifexPing_Key/refs/heads/main/keys.txt";
        const LINK4M_API_TOKEN = "6535cd3e87fc4d228f7e0fb1"; // Thay Token Link4M của bạn vào đây

        const params = new URLSearchParams(window.location.search);
        const deviceId = params.get('device') || "UNKNOW_DEVICE";
        document.getElementById('dev-id').innerText = "Device ID: " + deviceId;

        // Xử lý sau khi vượt link xong
        if (params.get('done') === 'true') {
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            getKeyFromGithub();
        }

        async function getKeyFromGithub() {
            try {
                const response = await fetch(GITHUB_RAW_URL);
                const secretToken = await response.text();
                const cleanToken = secretToken.trim();
                
                // Tạo Key ngẫu nhiên dựa trên DeviceID + Token từ Github
                const hash = CryptoJS.SHA256(deviceId + cleanToken).toString().toUpperCase();
                const formattedKey = `Sifex-Ping-${hash.substring(0, 4)}-${hash.substring(4, 8)}`;
                
                document.getElementById('final-key').innerText = formattedKey;
            } catch (e) {
                alert("Lỗi kết nối GitHub!");
            }
        }

        function generateLink() {
            const currentUrl = window.location.href.split('?')[0];
            const callback = `${currentUrl}?device=${deviceId}&done=true`;
            // Tự động gọi Link4M để tạo link
            window.location.href = `https://link4m.com/api-shorten/v2?api=${LINK4M_API_TOKEN}&url=${encodeURIComponent(callback)}`;
        }

        function copyKey() {
            const text = document.getElementById('final-key').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Đã sao chép!"));
        }
    </script>
</body>
</html>
